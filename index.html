<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KSA Passive Income Dashboard</title>
<style>
  :root{
    --bg:#f6f7f5; --card:#ffffff; --ink:#16201b; --muted:#6b7770;
    --line:#e4e8e4; --accent:#15803d; --accent-soft:#e7f3ec;
    --warn:#b45309; --warn-soft:#fdf3e7; --danger:#be123c;
    --banking:#15803d; --energy:#0e7490; --utilities:#b45309;
    --telecoms:#6d28d9; --other:#be123c; --realestate:#0f766e;
    --radius:14px; --shadow:0 1px 2px rgba(20,32,27,.05),0 4px 16px rgba(20,32,27,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 64px}
  a{color:var(--accent)}
  h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
  .muted{color:var(--muted)}
  .small{font-size:13px}
  .tiny{font-size:12px}
  /* header */
  header.top{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:8px}
  .logo{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex:0 0 auto}
  .title h1{font-size:20px}
  .title .sub{font-size:13px;color:var(--muted)}
  .grow{flex:1 1 auto}
  /* banner */
  .banner{display:flex;gap:10px;align-items:flex-start;background:var(--warn-soft);
    border:1px solid #f0dcc0;color:#7c4a06;border-radius:12px;padding:10px 12px;margin:12px 0;font-size:13px}
  .banner b{color:#6b3e04}
  /* tabs */
  .tabs{display:flex;gap:4px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:4px;margin:14px 0 18px;box-shadow:var(--shadow)}
  .tab{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;
    font-size:14px;padding:8px 14px;border-radius:9px;cursor:pointer;font-weight:550;white-space:nowrap}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--accent-soft);color:var(--accent)}
  /* cards */
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow)}
  .stat .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .stat .value{font-size:26px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
  .stat .value .unit{font-size:14px;color:var(--muted);font-weight:600;margin-left:4px}
  .stat .foot{font-size:12px;color:var(--muted);margin-top:4px}
  .pos{color:var(--accent)} .neg{color:var(--danger)}
  section{margin-top:18px}
  .sec-head{display:flex;align-items:center;gap:10px;margin:0 2px 10px}
  .sec-head h2{font-size:15px}
  .sec-head .hint{font-size:12px;color:var(--muted)}
  /* table */
  .tbl-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
  th,td{padding:9px 9px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    font-weight:650;background:#fbfcfb;position:sticky;top:0}
  tbody tr:last-child td{border-bottom:0}

  td.num{font-variant-numeric:tabular-nums}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;

  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}

<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef} = React;
const LS_KEY = "ksa-portfolio-v2";

/* ----------------------------- defaults ----------------------------- */
const SECTOR_COLORS = {
  Banking:"var(--banking)", Energy:"var(--energy)", Utilities:"var(--utilities)",
  Telecoms:"var(--telecoms)", Other:"var(--other)", "Real Estate":"var(--realestate)"
};
const SECTOR_HEX = {
  Banking:"#15803d", Financials:"#047857", Energy:"#0e7490", Materials:"#a16207",
  Utilities:"#b45309", Telecoms:"#6d28d9", Healthcare:"#db2777", Industrials:"#475569",
  "Real Estate":"#0f766e", Consumer:"#c2410c", Other:"#be123c"
};

// Loaded from Ahmed's Sahm account (30 Jun 2026), prices kept from his app so P/L matches.
// Dividend yields ~ TTM from Argaam / market data (Jun 2026) — approximate, verify before relying.
const DEFAULT_HOLDINGS = [
  {ticker:"4009", name:"Saudi German Health",   sector:"Healthcare",  targetPct:16, price:31.86, shares:3,  avgCost:35.42, yield:1.5},
  {ticker:"1303", name:"Electrical Industries", sector:"Industrials", targetPct:27, price:14.43, shares:11, avgCost:13.46, yield:2.2},
  {ticker:"4220", name:"Emaar EC",              sector:"Real Estate", targetPct:20, price:9.98,  shares:12, avgCost:9.62,  yield:0},
  {ticker:"4327", name:"Alramz Real Estate",    sector:"Real Estate", targetPct:37, price:55.80, shares:4,  avgCost:54.40, yield:2.9},
];

// The dividend-income names from the original strategy doc — offered as Watchlist candidates.
const PLAN_CANDIDATES = [
  {ticker:"1120", name:"Al Rajhi Bank",       sector:"Banking"},
  {ticker:"1010", name:"Riyad Bank",          sector:"Banking"},
  {ticker:"1180", name:"Saudi National Bank", sector:"Banking"},
  {ticker:"1030", name:"SABB",                sector:"Banking"},
  {ticker:"2222", name:"Saudi Aramco",        sector:"Energy"},
  {ticker:"2010", name:"SABIC",               sector:"Materials"},
  {ticker:"2060", name:"Saudi Electricity",   sector:"Utilities"},
  {ticker:"2087", name:"ACWA Power",          sector:"Utilities"},
  {ticker:"7010", name:"STC",                 sector:"Telecoms"},
  {ticker:"7020", name:"Mobily",              sector:"Telecoms"},
  {ticker:"4012", name:"Alkhorayef Water",    sector:"Industrials"},
  {ticker:"4081", name:"Jarir Marketing",     sector:"Consumer"},
];

const DEFAULT_STATE = {
  settings:{ monthlyBudget:1000, stakePct:35, sahmPct:65, reinvest:true, years:5, pricesUpdated:"2026-06-30 (Sahm)" },
  cash:23.84,
  stake:{ currentValue:1100, yield:9.4 },
  holdings: DEFAULT_HOLDINGS.map(h=>({...h})),
  transactions:[],
  dividends:[],
  watchlist:[],
};

/* ----------------------------- helpers ------------------------------ */
const ALL_SECTORS = ["Banking","Financials","Energy","Materials","Utilities","Telecoms","Healthcare","Industrials","Real Estate","Consumer","Other"];
function usedSectors(holdings){ const o=[]; holdings.forEach(h=>{ if(!o.includes(h.sector)) o.push(h.sector); }); return o; }
const fmt = (n,d=0)=> (isFinite(n)?n:0).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const sar = (n,d=0)=> fmt(n,d)+" SAR";
const pct = (n,d=1)=> fmt(n,d)+"%";
const num = v => { const x=parseFloat(v); return isFinite(x)?x:0; };

function mergeState(s){
  s = s || {};
  return {
    ...DEFAULT_STATE, ...s,
    settings:{...DEFAULT_STATE.settings, ...(s.settings||{})},
    stake:{...DEFAULT_STATE.stake, ...(s.stake||{})},
    holdings: Array.isArray(s.holdings)&&s.holdings.length ? s.holdings : DEFAULT_STATE.holdings,
    transactions: s.transactions||[],
    dividends: s.dividends||[],
    watchlist: s.watchlist||[],
  };
}
function loadState(){
  try{ const raw = localStorage.getItem(LS_KEY); return raw ? mergeState(JSON.parse(raw)) : DEFAULT_STATE; }
  catch(e){ return DEFAULT_STATE; }
}

/* ──────────────── Cloud sync — Google Drive (optional) ────────────────
   Stores one private file "ksa-portfolio.json" in YOUR Google Drive so the
   same data syncs across phone + laptop. No backend: the browser talks to
   Google directly. Needs a one-time OAuth Client ID (see SETUP.md) — paste it
   via "Connect Drive"; it's kept in localStorage. Without it the app is
   local-only and everything below is simply unused. */
const DRIVE_FILE_NAME = "ksa-portfolio.json";
const GOOGLE_SCOPES   = "email https://www.googleapis.com/auth/drive.file";
const GCID_KEY        = "ksa-google-client-id";
const getClientId = () => (localStorage.getItem(GCID_KEY) || "").trim();
const cloudConfigured = () => getClientId().length > 0;

// Live prices: the dashboard GETs your Apps Script web app (it fetches Yahoo server-side,
// dodging browser CORS) and returns { prices:{ticker:price}, asOf }. See SETUP.md.
const PRICES_URL_KEY = "ksa-prices-url";
const getPricesUrl = () => (localStorage.getItem(PRICES_URL_KEY) || "").trim();
async function fetchLivePrices(tickers){
  const url = getPricesUrl();
  if(!url || !tickers.length) return null;
  const u = url + (url.includes("?")?"&":"?") + "tickers=" + encodeURIComponent(tickers.join(","));
  const r = await fetch(u);
  if(!r.ok) throw new Error("price fetch "+r.status);
  return await r.json();
}

let _tokenClient=null, _tokenClientId="", _accessToken="", _tokenExp=0;
const gisReady = () => !!(window.google && google.accounts && google.accounts.oauth2);
function tokenClient(){
  const cid = getClientId();
  if(!cid || !gisReady()) return null;
  if(_tokenClient && _tokenClientId===cid) return _tokenClient;
  _tokenClientId = cid;
  _tokenClient = google.accounts.oauth2.initTokenClient({ client_id:cid, scope:GOOGLE_SCOPES, callback:()=>{} });
  return _tokenClient;
}
function getToken(){
  return new Promise((resolve,reject)=>{
    if(_accessToken && Date.now() < _tokenExp-60000) return resolve(_accessToken);
    const tc = tokenClient();
    if(!tc) return reject(new Error("Google sign-in not ready"));
    tc.callback = (resp)=>{
      if(resp && resp.error) return reject(new Error(resp.error));
      _accessToken = resp.access_token;
      _tokenExp = Date.now() + ((resp.expires_in||3600)*1000);
      resolve(_accessToken);
    };
    tc.requestAccessToken({prompt:""});
  });
}
async function driveApi(url, opts={}){
  const token = await getToken();
  const r = await fetch(url, {...opts, headers:{...(opts.headers||{}), Authorization:"Bearer "+token}});
  if(r.status===401){ _accessToken=""; throw new Error("Google session expired — try again"); }
  if(!r.ok) throw new Error("Google Drive error "+r.status);
  return r;
}
async function driveWhoAmI(){
  const r = await driveApi("https://www.googleapis.com/oauth2/v3/userinfo");
  return (await r.json()).email || "";
}
async function driveFind(){
  const q = encodeURIComponent("name='"+DRIVE_FILE_NAME+"' and trashed=false");
  const r = await driveApi("https://www.googleapis.com/drive/v3/files?q="+q+"&spaces=drive&orderBy=modifiedTime desc&fields=files(id,modifiedTime)");
  const j = await r.json();
  return (j.files && j.files[0]) || null;
}
async function driveRead(id){
  const r = await driveApi("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media");
  return await r.json();
}
async function driveCreate(data){
  const fd = new FormData();
  fd.append("metadata", new Blob([JSON.stringify({name:DRIVE_FILE_NAME, mimeType:"application/json"})], {type:"application/json"}));
  fd.append("file", new Blob([JSON.stringify(data)], {type:"application/json"}));
  const r = await driveApi("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {method:"POST", body:fd});
  return (await r.json()).id;
}
async function driveWrite(id, data){
  await driveApi("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media", {method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)});
}

function equityValue(holdings){ return holdings.reduce((a,h)=>a+num(h.price)*num(h.shares),0); }
const holdingPL   = h  => (num(h.price)-num(h.avgCost))*num(h.shares);
const portfolioCost = hs => hs.reduce((a,h)=> a + (num(h.avgCost)>0 ? num(h.avgCost)*num(h.shares) : 0), 0);
const portfolioPL   = hs => hs.reduce((a,h)=> a + (num(h.avgCost)>0 ? holdingPL(h) : 0), 0);
function weightedEquityYield(holdings){
  const tw = holdings.reduce((a,h)=>a+num(h.targetPct),0)||1;
  return holdings.reduce((a,h)=>a+num(h.targetPct)*num(h.yield),0)/tw;
}
function sectorAgg(holdings){
  const eq = equityValue(holdings);
  const m = {};
  usedSectors(holdings).forEach(s=>m[s]={sector:s,target:0,current:0,curPct:0});
  holdings.forEach(h=>{
    const s = m[h.sector]||(m[h.sector]={sector:h.sector,target:0,current:0,curPct:0});
    s.target += num(h.targetPct);
    s.current += num(h.price)*num(h.shares);
  });
  Object.values(m).forEach(s=> s.curPct = eq>0 ? s.current/eq*100 : 0);
  return Object.values(m);
}

// Cash-flow rebalancing. Greedily buys whole shares, each step choosing the
// purchase that moves the portfolio CLOSEST to target weights (minimises total
// absolute deviation). This deploys almost all the cash and won't dump a month's
// budget into a high-priced, low-weight name. Anything it can't place sensibly
// (e.g. one ACWA share costs more than its whole target slice) rolls to next month.
function monthlyPlan(holdings, stockBudget){
  const price  = holdings.map(h=>num(h.price));
  const shares = holdings.map(h=>num(h.shares));
  const bought = holdings.map(()=>0);
  const curEq  = holdings.reduce((a,_,i)=>a+price[i]*shares[i],0);
  const goal   = curEq + stockBudget;                 // target portfolio value after this month
  const tgtVal = holdings.map(h=> goal*num(h.targetPct)/100);
  let remaining = stockBudget, guard = 0;
  while(guard++ < 100000){
    let best=-1, bestImp=1e-9;                          // require a strictly positive improvement
    for(let i=0;i<holdings.length;i++){
      if(price[i]<=0 || price[i] > remaining+1e-9) continue;
      const cur    = price[i]*(shares[i]+bought[i]);
      const before = Math.abs(tgtVal[i]-cur);
      const after  = Math.abs(tgtVal[i]-(cur+price[i]));
      const imp    = before-after;
      if(imp>bestImp){ bestImp=imp; best=i; }
    }
    if(best<0) break;
    bought[best]++; remaining -= price[best];
  }
  const rows = holdings.map((h,i)=>{
    const curVal = price[i]*shares[i];
    return {...h, curVal, curPct: curEq>0?curVal/curEq*100:0, buyShares:bought[i], cost:price[i]*bought[i]};
  });
  const spent = rows.reduce((a,r)=>a+r.cost,0);
  return {rows, curEq, spent, leftover: stockBudget-spent};
}

// Full rebalance toward target weights — can BUY and SELL. Optional extraCash adds the
// month's new money to the pool. Whole-share rounding leaves a net-cash residual.
function rebalancePlan(holdings, extraCash){
  const price   = holdings.map(h=>num(h.price));
  const shares0 = holdings.map(h=>num(h.shares));
  const curEq   = holdings.reduce((a,_,i)=>a+price[i]*shares0[i],0);
  const tw      = holdings.reduce((a,h)=>a+num(h.targetPct),0)||100;
  const pool    = curEq + extraCash;                 // equity value to spread over target weights
  const rows = holdings.map((h,i)=>{
    const curVal    = price[i]*shares0[i];
    const targetVal = pool*(num(h.targetPct)/tw);
    const delta     = targetVal - curVal;
    let action="HOLD", deltaShares=0;
    if(price[i]>0){
      if(delta>0){ deltaShares=Math.floor(delta/price[i]); if(deltaShares>0) action="BUY"; }
      else if(delta<0){ deltaShares=Math.min(shares0[i], Math.floor((-delta)/price[i])); if(deltaShares>0) action="SELL"; }
    }
    return {...h, curVal, curPct: curEq>0?curVal/curEq*100:0, action, deltaShares, tradeValue:deltaShares*price[i]};
  });
  const sells = rows.filter(r=>r.action==="SELL").reduce((a,r)=>a+r.tradeValue,0);
  const buys  = rows.filter(r=>r.action==="BUY").reduce((a,r)=>a+r.tradeValue,0);
  return {rows, curEq, pool, sells, buys, netCash: extraCash + sells - buys};
}

function projectIncome(st){
  const {settings:cfg, stake, holdings} = st;
  const eqY = weightedEquityYield(holdings)/100;
  const reY = num(stake.yield)/100;
  const eqM = num(cfg.monthlyBudget)*num(cfg.sahmPct)/100;
  const reM = num(cfg.monthlyBudget)*num(cfg.stakePct)/100;
  let eqBal = equityValue(holdings);
  let reBal = num(stake.currentValue);
  let invested = eqBal+reBal;
  const rows=[];
  const years = Math.max(1,Math.min(15,num(cfg.years)||5));
  for(let y=1;y<=years;y++){
    let yearIncome=0;
    for(let m=0;m<12;m++){
      eqBal+=eqM; reBal+=reM; invested+=eqM+reM;
      const inc = eqBal*eqY/12 + reBal*reY/12;
      yearIncome+=inc;
      if(cfg.reinvest){ eqBal+=eqBal*eqY/12; reBal+=reBal*reY/12; }
    }
    const runRate = eqBal*eqY/12 + reBal*reY/12;
    rows.push({year:y, invested, value:eqBal+reBal, annualIncome:yearIncome, monthlyIncome:runRate});
  }
  return {rows, eqYield:eqY*100, reYield:reY*100};
}

function download(filename, text, type="text/plain"){
  const blob = new Blob([text],{type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

/* ----------------------------- UI bits ------------------------------ */
function Stat({label,value,unit,foot,footClass}){
  return (
    <div className="card stat">
      <div className="label">{label}</div>
      <div className="value">{value}{unit&&<span className="unit">{unit}</span>}</div>
      {foot&&<div className={"foot "+(footClass||"")}>{foot}</div>}
    </div>
  );
}

function Donut({segments,size=190,stroke=30,center,sub}){
  const r=(size-stroke)/2, c=2*Math.PI*r, cx=size/2, cy=size/2;
  const total = segments.reduce((a,s)=>a+s.value,0);
  let acc=0;
  return (
    <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <g transform={`rotate(-90 ${cx} ${cy})`}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#eef0ee" strokeWidth={stroke}/>
          {total>0 && segments.map((s,i)=>{
            const frac=s.value/total, len=frac*c, off=-acc*c; acc+=frac;
            return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color}
              strokeWidth={stroke} strokeDasharray={`${len} ${c-len}`} strokeDashoffset={off}
              strokeLinecap="butt"/>;
          })}
        </g>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
        alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
        <div style={{fontWeight:700,fontSize:18,letterSpacing:"-.02em"}}>{center}</div>
        {sub&&<div className="tiny muted">{sub}</div>}
      </div>
    </div>
  );
}

  const pl = portfolioPL(st.holdings);
  const cost = portfolioCost(st.holdings);
  const plPct = cost>0 ? pl/cost*100 : 0;
  const proj = useMemo(()=>projectIncome(st),[st]);
  const yr1 = proj.rows[0]||{}; const last = proj.rows[proj.rows.length-1]||{};
  const sectors = sectorAgg(st.holdings);
  const barMax = Math.max(30, ...sectors.flatMap(s=>[s.target, s.curPct]));

  // top-level split donut: Sahm equity vs Stake real estate (by current value)

    {name:"Stake (Real Estate)", value:num(st.stake.currentValue), color:SECTOR_HEX["Real Estate"]},
  ];
  // sector donut (uses current value; falls back to target if no shares yet)
  const hasShares = eq>0;
  const sectorSegs = sectors.map(s=>({name:s.sector, value: hasShares?s.current:s.target, color:SECTOR_HEX[s.sector]||"#888"}));

  return (
    <div>

        <Stat label="Unrealized P/L" value={(pl>=0?"+":"")+fmt(pl,2)} unit="SAR"

        <Stat label="Monthly Investment" value={fmt(st.settings.monthlyBudget)} unit="SAR"
          foot={`${sar(st.settings.monthlyBudget*st.settings.sahmPct/100)} Sahm · ${sar(st.settings.monthlyBudget*st.settings.stakePct/100)} Stake`}/>
        <Stat label="Projected Income · Yr 1" value={fmt(yr1.annualIncome)} unit="SAR/yr"
          foot={`≈ ${sar(yr1.annualIncome/12)} / month`} footClass="pos"/>
        <Stat label={`Projected · Yr ${last.year||5}`} value={fmt(last.value)} unit="SAR"
          foot={`≈ ${sar(last.monthlyIncome)} / month income`} footClass="pos"/>
      </div>

      <section>
        <div className="sec-head"><h2>Allocation</h2>
          <span className="hint">{hasShares?"by current value":"showing targets — no holdings logged yet"}</span></div>
        <div className="two-col">
          <div className="card">
            <div className="center-note small muted" style={{marginBottom:6}}>Platform split</div>
            <Donut segments={splitSegs} center={fmt(total)} sub="SAR total"/>
            <div className="legend" style={{marginTop:14}}>
              {splitSegs.map(s=>(
                <div className="row" key={s.name}>
                  <span className="dot" style={{background:s.color}}/>
                  <span className="nm">{s.name}</span>
                  <span className="vl">{total>0?pct(s.value/total*100):"—"}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="center-note small muted" style={{marginBottom:6}}>Equity sectors {hasShares?"(current)":"(target)"}</div>
            <div className="two-col" style={{gridTemplateColumns:"190px 1fr",gap:10,alignItems:"center"}}>
              <Donut segments={sectorSegs} center={sectors.length} sub="sectors"/>
              <div className="legend">
                {sectors.map(s=>(
                    <div className="row" key={s.sector}>
                      <span className="dot" style={{background:SECTOR_HEX[s.sector]||"#888"}}/>
                      <span className="nm">{s.sector}</span>
                      <span className="vl">{hasShares?pct(s.curPct):pct(s.target)}</span>
                    </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div className="sec-head"><h2>Target vs. current</h2><span className="hint">marker = target weight</span></div>
        <div className="card">

            return (
              <div className="bar-row" key={s.sector}>

                <div className="bar-track">

function MonthlyPlan({st}){
  const [mode,setMode] = useState("cash");

  const plan = useMemo(()=>monthlyPlan(st.holdings, stockBudget),[st.holdings,stockBudget]);
  const extraCash = includeCash ? stockBudget : 0;
  const reb  = useMemo(()=>rebalancePlan(st.holdings, extraCash),[st.holdings,extraCash]);
  const noPrices = st.holdings.some(h=>num(h.price)<=0);

  function exportCSV(){
    const head = ["Ticker","Company","Sector","Target %","Current %","Action","Buy shares","Est. cost (SAR)","Price"];
    const lines = plan.rows.filter(r=>r.buyShares>0).map(r=>
      [r.ticker,`"${r.name}"`,r.sector,fmt(r.targetPct,1),fmt(r.curPct,1),"BUY",r.buyShares,fmt(r.cost,2),fmt(r.price,2)].join(","));
    lines.push([`,,,,,STAKE (real estate),,${fmt(stakeBudget,2)},`].join(""));
    download(`ksa-monthly-plan.csv`, head.join(",")+"\n"+lines.join("\n"), "text/csv");

            <Stat label="This month → Stake" value={fmt(stakeBudget)} unit="SAR" foot="single deposit, real-estate fund"/>

          <section>
            <div className="sec-head"><h2>Buy list — directs new cash to underweight names</h2>
              <span className="grow"/>
              <button className="btn" onClick={exportCSV}>Export CSV</button>
            </div>
            {noPrices && <div className="banner"><span>⚠</span><span>Some prices are 0 — set live prices in the <b>Holdings</b> tab so share counts compute.</span></div>}
            <div className="tbl-wrap">
              <table>
                <thead><tr>
                  <th>Stock</th><th>Sector</th><th>Target</th><th>Current</th>
                  <th>Action</th><th>Buy (shares)</th><th>Est. cost</th>
                </tr></thead>
                <tbody>
                  {plan.rows.map(r=>(
                    <tr key={r.ticker}>
                      <td><b>{r.ticker}</b> <span className="muted small">{r.name}</span></td>
                      <td><span className="chip"><span className="dot" style={{background:SECTOR_HEX[r.sector]||"#888"}}/>{r.sector}</span></td>
                      <td className="num">{pct(r.targetPct)}</td>

                      <td><span className={"pill "+(r.buyShares>0?"buy":"hold")}>{r.buyShares>0?"BUY":"HOLD"}</span></td>
                      <td className="num"><b>{r.buyShares>0?r.buyShares:"—"}</b></td>
                      <td className="num">{r.buyShares>0?sar(r.cost,2):"—"}</td>

                  <tr>

                    <td><span className="chip"><span className="dot" style={{background:SECTOR_HEX["Real Estate"]}}/>Real Estate</span></td>

function Logs({st,update}){
  const blankTx = {date:"",ticker:"",action:"BUY",qty:"",price:"",commission:"",note:""};
  const blankDv = {date:"",ticker:"",perShare:"",shares:"",note:""};
  const [tx,setTx] = useState(blankTx);
  const [dv,setDv] = useState(blankDv);

  function addTx(){
    if(!tx.ticker) return;
    const rec = {...tx, qty:num(tx.qty), price:num(tx.price), commission:num(tx.commission),
      total:num(tx.qty)*num(tx.price)+num(tx.commission)};
    update({...st, transactions:[rec, ...st.transactions]});
    setTx(blankTx);
  }
  function addDv(){
    if(!dv.ticker) return;
    const rec = {...dv, perShare:num(dv.perShare), shares:num(dv.shares), total:num(dv.perShare)*num(dv.shares)};
    update({...st, dividends:[rec, ...st.dividends]});
    setDv(blankDv);
  }
  const delTx = i => update({...st, transactions: st.transactions.filter((_,j)=>j!==i)});
  const delDv = i => update({...st, dividends: st.dividends.filter((_,j)=>j!==i)});
  const ytdDiv = st.dividends.reduce((a,d)=>a+num(d.total),0);

  return (
    <div>
      <section style={{marginTop:0}}>
        <div className="sec-head"><h2>Trade log</h2></div>
        <div className="card" style={{marginBottom:12}}>
          <div className="controls">

            <div className="field"><label>Action</label><select value={tx.action} onChange={e=>setTx({...tx,action:e.target.value})}><option>BUY</option><option>SELL</option></select></div>

            <div className="field"><label>Price</label><input value={tx.price} onChange={e=>setTx({...tx,price:e.target.value})}/></div>
            <div className="field"><label>Commission</label><input value={tx.commission} onChange={e=>setTx({...tx,commission:e.target.value})}/></div>
          </div>
          <div className="btn-row" style={{marginTop:12}}><button className="btn primary" onClick={addTx}>Add trade</button></div>
        </div>
        {st.transactions.length? (
          <div className="tbl-wrap"><table>
            <thead><tr><th>Date</th><th>Ticker</th><th>Action</th><th>Qty</th><th>Price</th><th>Total</th><th></th></tr></thead>

              <tr key={i}><td>{t.date||"—"}</td><td><b>{t.ticker}</b></td><td>{t.action}</td>
                <td className="num">{fmt(t.qty)}</td><td className="num">{sar(t.price,2)}</td><td className="num">{sar(t.total,2)}</td>
                <td><button className="icon-btn" onClick={()=>delTx(i)}>✕</button></td></tr>
            ))}</tbody>
          </table></div>
        ):<div className="card empty">No trades logged yet.</div>}
      </section>

      <section>
        <div className="sec-head"><h2>Dividend log</h2><span className="hint">YTD collected: {sar(ytdDiv,2)}</span></div>
        <div className="card" style={{marginBottom:12}}>
          <div className="controls">
            <div className="field"><label>Date</label><input placeholder="2026-06-30" value={dv.date} onChange={e=>setDv({...dv,date:e.target.value})}/></div>
            <div className="field"><label>Ticker</label><input value={dv.ticker} onChange={e=>setDv({...dv,ticker:e.target.value})}/></div>
            <div className="field"><label>Per share</label><input value={dv.perShare} onChange={e=>setDv({...dv,perShare:e.target.value})}/></div>
            <div className="field"><label>Shares held</label><input value={dv.shares} onChange={e=>setDv({...dv,shares:e.target.value})}/></div>
          </div>
          <div className="btn-row" style={{marginTop:12}}><button className="btn primary" onClick={addDv}>Add dividend</button></div>
        </div>
        {st.dividends.length? (
          <div className="tbl-wrap"><table>
            <thead><tr><th>Date</th><th>Ticker</th><th>Per share</th><th>Shares</th><th>Total</th><th></th></tr></thead>
            <tbody>{st.dividends.map((d,i)=>(
              <tr key={i}><td>{d.date||"—"}</td><td><b>{d.ticker}</b></td>
                <td className="num">{sar(d.perShare,2)}</td><td className="num">{fmt(d.shares)}</td><td className="num pos">{sar(d.total,2)}</td>
                <td><button className="icon-btn" onClick={()=>delDv(i)}>✕</button></td></tr>
            ))}</tbody>
          </table></div>
        ):<div className="card empty">No dividends logged yet.</div>}
      </section>
    </div>
  );
}

/* ----------------------------- app ---------------------------------- */
function Watchlist({st,update}){
  const wl = st.watchlist || [];
  function setW(i,key,val){
    const watchlist = wl.map((w,j)=> j===i ? {...w,[key]: (key==="ticker"||key==="name"||key==="sector")?val:num(val)} : w);
    update({...st, watchlist});
  }
  function addRow(){ update({...st, watchlist:[...wl, {ticker:"", name:"", sector:"Other", price:0, yield:0}]}); }
  function delRow(i){ update({...st, watchlist: wl.filter((_,j)=>j!==i)}); }
  function addPlanCandidates(){
    const have = new Set(wl.map(w=>w.ticker));
    const add = PLAN_CANDIDATES.filter(c=>!have.has(c.ticker)).map(c=>({...c, price:0, yield:0}));
    if(add.length) update({...st, watchlist:[...wl, ...add]});
  }
  const blended = weightedEquityYield(st.holdings);

  return (
    <div>
      <div className="banner"><span>ⓘ</span><span><b>Candidates you're researching.</b> Shows public data for tickers <b>you</b> add — it is <b>not</b> a recommendation or a suggestion to buy. Price auto-updates via <b>↻ Prices</b> (top-right); enter each dividend yield yourself from Argaam / Tadawul.</span></div>

      <div className="grid cards" style={{marginBottom:14}}>
        <Stat label="Your equity blended yield" value={pct(blended)} foot="benchmark — what you already earn"/>
        <Stat label="Stake fund yield" value={pct(num(st.stake.yield))} foot="your real-estate sleeve"/>
      </div>

      {wl.length ? (
        <div className="tbl-wrap">
          <table>
            <thead><tr>
              <th>Ticker</th><th>Company</th><th>Sector</th><th>Price</th><th>Yield %</th><th>Div / share</th><th></th>
            </tr></thead>
            <tbody>
              {wl.map((w,i)=>(
                <tr key={i}>
                  <td><input className="cell" style={{textAlign:"left",width:70}} value={w.ticker} onChange={e=>setW(i,"ticker",e.target.value)}/></td>
                  <td><input className="cell" style={{textAlign:"left",minWidth:130}} placeholder="name" value={w.name} onChange={e=>setW(i,"name",e.target.value)}/></td>
                  <td><select value={w.sector} onChange={e=>setW(i,"sector",e.target.value)} style={{minWidth:120}}>{ALL_SECTORS.map(s=><option key={s}>{s}</option>)}</select></td>
                  <td className="num">{num(w.price)>0 ? sar(w.price,2) : "—"}</td>
                  <td style={{width:80}}><input className="cell" value={w.yield} onChange={e=>setW(i,"yield",e.target.value)}/></td>
                  <td className="num">{num(w.price)>0 && num(w.yield)>0 ? sar(num(w.price)*num(w.yield)/100,2) : "—"}</td>
                  <td><button className="icon-btn" title="Remove" onClick={()=>delRow(i)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : <div className="card empty">No candidates yet — add a ticker you're considering, then hit ↻ Prices.</div>}

      <div className="btn-row" style={{marginTop:12}}>
        <button className="btn" onClick={addRow}>+ Add candidate</button>
        <button className="btn" onClick={addPlanCandidates} title="Adds the dividend names from your original strategy doc (banks, telecoms, energy…)">+ Add income-plan names</button>
      </div>

      <section>
        <div className="sec-head"><h2>For comparison — what you own</h2><span className="hint">your current holdings</span></div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Ticker</th><th>Company</th><th>Sector</th><th>Price</th><th>Yield %</th></tr></thead>
            <tbody>
              {st.holdings.map((h,i)=>(
                <tr key={i}>
                  <td><b>{h.ticker}</b></td>
                  <td className="muted">{h.name}</td>
                  <td><span className="chip"><span className="dot" style={{background:SECTOR_HEX[h.sector]||"#888"}}/>{h.sector}</span></td>
                  <td className="num">{sar(num(h.price),2)}</td>
                  <td className="num">{pct(num(h.yield))}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </section>

      <p className="small muted" style={{marginTop:10}}>Data only — do your own research (Argaam, Tadawul filings) or consult a licensed advisor before buying. To actually hold a candidate, add it in <b>Holdings</b>.</p>
    </div>
  );
}

function CloudChip({cloud,onConnect,onDisconnect}){
  const {status,email,last,msg} = cloud;
  if(status==="on"){
    const t = last ? new Date(last).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "";
    return <span className="cloud on" title={email+(t?" · last sync "+t:"")} onClick={onDisconnect}>
      <span className="dotc"/>Synced{email?" · "+email.split("@")[0]:""}</span>;
  }
  if(status==="signing") return <span className="cloud" title="Connecting to Google Drive">Connecting…</span>;
  if(status==="error") return <span className="cloud err" title={msg} onClick={onConnect}>⚠ Sync error — retry</span>;
  return <span className="cloud" title="Sync your data across phone & laptop via Google Drive" onClick={onConnect}>☁ Connect Drive</span>;
}

function App(){
  const [st,setSt] = useState(loadState);
  const [tab,setTab] = useState("dashboard");
  const [cloud,setCloud] = useState({status: cloudConfigured()?"off":"unset", email:"", fileId:"", last:0, msg:""});
  const [priceState,setPriceState] = useState("");
  const fileRef = useRef();
  const pushTimer = useRef();

  useEffect(()=>{ try{ localStorage.setItem(LS_KEY, JSON.stringify(st)); }catch(e){} },[st]);
  useEffect(()=>{ if(getPricesUrl()) refreshPricesNow(true); },[]);   // fetch-on-open

  // push local changes up to Drive (debounced) once connected
  useEffect(()=>{
    if(cloud.status!=="on" || !cloud.fileId) return;
    clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(()=>{
      driveWrite(cloud.fileId, {...st, updatedAt: Date.now()})
        .then(()=> setCloud(c=>({...c, last: Date.now(), msg:""})))
        .catch(e=> setCloud(c=>({...c, status:"error", msg:(e&&e.message)||"sync failed"})));
    }, 1500);
    return ()=> clearTimeout(pushTimer.current);
  },[st, cloud.status, cloud.fileId]);

  async function cloudConnect(){
    let cid = getClientId();
    if(!cid){
      cid = (window.prompt("Paste your Google OAuth Client ID (one-time — see SETUP.md):","")||"").trim();
      if(!cid) return;
      localStorage.setItem(GCID_KEY, cid); _tokenClient=null;
    }
    setCloud(c=>({...c, status:"signing", msg:""}));
    try{
      await getToken();
      const email = await driveWhoAmI();
      const found = await driveFind();
      let fileId;
      if(found){ fileId = found.id; setSt(mergeState(await driveRead(fileId))); }   // remote wins on connect
      else { fileId = await driveCreate({...st, updatedAt: Date.now()}); }           // first device seeds it
      setCloud({status:"on", email, fileId, last: Date.now(), msg:""});
    }catch(e){ setCloud(c=>({...c, status:"error", msg:(e&&e.message)||"could not connect"})); }
  }
  function cloudDisconnect(){ _accessToken=""; setCloud({status: cloudConfigured()?"off":"unset", email:"", fileId:"", last:0, msg:""}); }

  async function refreshPricesNow(auto){
    let url = getPricesUrl();
    if(!url){
      if(auto) return;
      url = (window.prompt("Paste your price web-app URL (one-time — see SETUP.md):","")||"").trim();
      if(!url) return; localStorage.setItem(PRICES_URL_KEY, url);
    }
    const wl = st.watchlist||[];
    const tickers = [...new Set([...st.holdings.map(h=>h.ticker), ...wl.map(w=>w.ticker)].filter(Boolean))];
    if(!tickers.length) return;
    setPriceState("busy");
    try{
      const data = await fetchLivePrices(tickers);
      const prices = (data && data.prices) || {};
      let n=0;
      const holdings = st.holdings.map(h=>{ const p=num(prices[h.ticker]); if(p>0){ n++; return {...h, price:p}; } return h; });
      const watchlist = wl.map(w=>{ const p=num(prices[w.ticker]); if(p>0){ n++; return {...w, price:p}; } return w; });
      if(n>0) setSt({...st, holdings, watchlist, settings:{...st.settings, pricesUpdated:(data.asOf||new Date().toLocaleString())+" (live)"}});
      setPriceState(n>0 ? "" : "no prices returned");
    }catch(e){ setPriceState("couldn't reach price source"); }
  }

  function exportJSON(){ download("ksa-portfolio-backup.json", JSON.stringify(st,null,2), "application/json"); }
  function importJSON(e){
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{ try{ setSt(mergeState(JSON.parse(r.result))); }catch(err){ alert("Could not read that file."); } };
    r.readAsText(f); e.target.value="";
  }
  function reset(){ if(confirm("Reset to default seed data? Your logged trades and edits will be lost.")) setSt(DEFAULT_STATE); }

  const tabs = [["dashboard","Dashboard"],["plan","Monthly plan"],["holdings","Holdings"],["watchlist","Watchlist"],["income","Income"],["logs","Logs"]];

  return (
    <div className="wrap">
      <header className="top">
        <div className="logo">ع</div>
        <div className="title">
          <h1>KSA Passive Income Dashboard</h1>
          <div className="sub">Tadawul dividends + Stake real estate · manual rebalancing tracker</div>
        </div>
        <span className="grow"/>
        <div className="btn-row">
          <button className="btn ghost" onClick={()=>refreshPricesNow(false)} title={priceState && priceState!=="busy" ? priceState : "Fetch live prices now (also runs automatically when you open the app)"}>{priceState==="busy" ? "Refreshing…" : "↻ Prices"}</button>
          <CloudChip cloud={cloud} onConnect={cloudConnect} onDisconnect={cloudDisconnect}/>
          <button className="btn ghost" onClick={()=>fileRef.current.click()}>Import</button>
          <button className="btn ghost" onClick={exportJSON}>Backup</button>
          <input ref={fileRef} type="file" accept="application/json" onChange={importJSON} style={{display:"none"}}/>
        </div>
      </header>

      <div className="banner">
        <span>↻</span>
        <span><b>Loaded from your Sahm account.</b> Refresh prices in <b>Holdings</b> before each monthly plan, and set each stock's dividend yield for income projections (they default to 0).
        Tracks your plan and math — not investment advice.{st.settings.pricesUpdated?` Prices set: ${st.settings.pricesUpdated}.`:""}</span>
      </div>

      <nav className="tabs">
        {tabs.map(([k,label])=>(
          <button key={k} className={"tab"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{label}</button>
        ))}
      </nav>

      {tab==="dashboard" && <Dashboard st={st}/>}
      {tab==="plan" && <MonthlyPlan st={st}/>}
      {tab==="holdings" && <Holdings st={st} update={setSt}/>}
      {tab==="watchlist" && <Watchlist st={st} update={setSt}/>}
      {tab==="income" && <Income st={st} update={setSt}/>}
      {tab==="logs" && <Logs st={st} update={setSt}/>}

      <footer>
        <div className="btn-row">
          <button className="btn ghost small" onClick={reset}>Reset to seed data</button>
        </div>
        <ul>
          <li>Data lives in this browser (localStorage). <b>Connect Drive</b> (top-right) syncs it across phone &amp; laptop via your Google account; <b>Backup</b> exports a JSON copy anytime.</li>
          <li>Tax note: as a Saudi-resident individual, Tadawul dividends are generally not subject to personal income tax or withholding (the 5% WHT applies to non-resident shareholders). Zakat may apply to wealth — confirm with a specialist.</li>
          <li>The Monthly plan has two modes: <b>add new cash</b> (buy-only, minimises commission) and <b>rebalance</b> (buy + sell to hit the target weights you set in Holdings).</li>
        </ul>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
